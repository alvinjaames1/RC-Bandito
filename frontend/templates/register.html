<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Bandito — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e63946;
    --dark: #0a0a0a;
    --panel: #111111;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --green: #2a9d2a;
    --yellow: #e9c46a;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(230,57,70,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(230,57,70,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 2rem;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .logo span { color: var(--red); }

  .tagline {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 2rem;
  }

  .panel-header {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--red); }
  input::placeholder { color: #333; }

  /* Password strength meter */
  .strength-meter {
    height: 3px;
    background: var(--border);
    margin-top: 8px;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    background: var(--red);
    transition: width 0.3s, background 0.3s;
  }

  .strength-text {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .btn {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.15em;
    padding: 0.85rem;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #c1121f; }
  .btn:active { transform: scale(0.98); }

  .msg {
    font-size: 0.75rem;
    padding: 0.6rem 0.8rem;
    margin-bottom: 1rem;
    display: none;
    letter-spacing: 0.05em;
  }

  .msg.error {
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.3);
    color: var(--red);
  }

  .msg.success {
    background: rgba(42,157,42,0.1);
    border: 1px solid rgba(42,157,42,0.3);
    color: var(--green);
  }

  .switch-link {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .switch-link a { color: var(--red); text-decoration: none; }
  .switch-link a:hover { text-decoration: underline; }

  .requirements {
    font-size: 0.62rem;
    color: var(--muted);
    line-height: 1.8;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .req { transition: color 0.2s; }
  .req.met { color: var(--green); }
  .req.met::before { content: '✓ '; }
  .req:not(.met)::before { content: '· '; }
</style>
</head>
<body>

<div class="container">
  <div class="logo">RC <span>Bandito</span></div>
  <p class="tagline">Secure Control Interface &nbsp;·&nbsp; v1.0</p>

  <div class="panel">
    <div class="panel-header">Create Operator Account</div>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="choose a username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" oninput="checkStrength()" />
      <div class="strength-meter"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="requirements">
        <span class="req" id="reqLen">At least 8 characters</span><br>
        <span class="req" id="reqNum">Contains a number</span><br>
        <span class="req" id="reqCase">Upper and lowercase letters</span>
      </div>
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" />
    </div>

    <button class="btn" onclick="handleRegister()">Create Account</button>

    <div class="switch-link">
      Already have an account? <a href="login.html">Log in →</a>
    </div>
  </div>
</div>

<script>
  function checkStrength() {
    const pw = document.getElementById('password').value;
    const fill = document.getElementById('strengthFill');

    const hasLen = pw.length >= 8;
    const hasNum = /\d/.test(pw);
    const hasCase = /[a-z]/.test(pw) && /[A-Z]/.test(pw);

    document.getElementById('reqLen').classList.toggle('met', hasLen);
    document.getElementById('reqNum').classList.toggle('met', hasNum);
    document.getElementById('reqCase').classList.toggle('met', hasCase);

    const score = [hasLen, hasNum, hasCase].filter(Boolean).length;
    const widths = ['0%', '33%', '66%', '100%'];
    const colors = ['#e63946', '#e63946', '#e9c46a', '#2a9d2a'];
    fill.style.width = widths[score];
    fill.style.background = colors[score];
  }

  async function handleRegister() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    hideMsgs();

    // Client-side validation
    if (!username || !email || !password || !confirm) {
      showError('All fields are required.');
      return;
    }

    if (username.length < 3) {
      showError('Username must be at least 3 characters.');
      return;
    }

    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
      showError('Please enter a valid email address.');
      return;
    }

    if (password.length < 8 || !/\d/.test(password) || !/[a-z]/.test(password) || !/[A-Z]/.test(password)) {
      showError('Password does not meet the requirements.');
      return;
    }

    if (password !== confirm) {
      showError('Passwords do not match.');
      return;
    }

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if (res.ok) {
        showSuccess('Account created! Redirecting to login...');
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } else {
        showError(data.error || 'Registration failed.');
      }
    } catch (e) {
      showError('Connection error. Is the server running?');
    }
  }

  function hideMsgs() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleRegister();
  });
</script>
</body>
</html>
